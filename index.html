<!DOCTYPE html>
<html>
<head>
  <title>Produk</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: purple;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card p {
      font-size: 13px;
      padding: 5px;
    }

    .card a {
      text-decoration: none;
      color: black;
    }
  </style>

</head>

<body>

<div class="container">

  <div class="card">
    <a href="https://s.shopee.co.id/901Vm2JSFp" target="_blank">
      <img src="https://i.postimg.cc/x1rVrNcW/IMG-20260424-WA0004.jpg">
      <p>Fromzero Rp:170.000</p>
    </a>
  </div>

  <div class="card">
    <a href="https://s.shopee.co.id/4qBwoU10IO" target="_blank">
      <img src="https://i.postimg.cc/Ls3p346Z/IMG-20260424-WA0005.jpg">
      <p>Fromzero Rp:165.000</p>
    </a>
  </div>

</div>

</body>
</html>
