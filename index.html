<!DOCTYPE html>
<html>
<head>
  <title>Letsfits Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: #ff5722;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .search-box {
      padding: 10px;
      background: white;
      position: sticky;
      top: 0;
    }

    .search-box input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card h4 {
      font-size: 14px;
      padding: 5px;
    }

    .card a {
      display: block;
      background: #ff5722;
      color: white;
      text-decoration: none;
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>Letsfits🔥</header>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Cari produk..." onkeyup="searchProduct()">
</div>

<div class="container" id="productContainer">

  <!-- PRODUK 1 -->
<div class="card" data-name="111 fromzero putih garis">
  <img src="IMG-20260424-WA0004.jpg">
  <h4>Kode: 111 - Fromzero Putih Garis</h4>
  <a href="https://s.shopee.co.id/901Vm2JSFp">Beli Sekarang</a>
</div>

<!-- PRODUK 2 -->
<div class="card" data-name="111 fromzero putih">
  <img src="IMG-20260424-WA0005.jpg">
  <h4>Kode: 111 - Fromzero Putih</h4>
  <a href="https://s.shopee.co.id/4qBwoU10IO">Beli Sekarang</a>
</div>

<!-- PRODUK 3 -->
<div class="card" data-name="111 fromzero hitam putih">
  <img src="IMG-20260424-WA0006.jpg">
  <h4>Kode: 111 - Fromzero Hitam Putih</h4>
  <a href="https://s.shopee.co.id/5q4U0XAER4">Beli Sekarang</a>
</div>

<!-- PRODUK 4 -->
<div class="card" data-name="111 fromzero hitam">
  <img src="IMG-20260424-WA0012.jpg">
  <h4>Kode: 111 - Fromzero Full Hitam</h4>
  <a href="https://s.shopee.co.id/10zEFhZX3O">Beli Sekarang</a>
</div>

<!-- PRODUK 5 -->
<div class="card" data-name="111 fromzero hitam putih">
  <img src="IMG-20260424-WA0001.jpg">
  <h4>Kode: 111 - Fromzero Hitam Putih</h4>
  <a href="https://s.shopee.co.id/3LN8sKeNXY">Beli Sekarang</a>
</div>
  

</div>

<script>
function searchProduct() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let data = card.getAttribute("data-name").toLowerCase();

    if (data.includes(input)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
