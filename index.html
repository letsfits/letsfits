<!DOCTYPE html>
<html>
<head>
  <title>LET'SOUTFIT</title>
  <style>
    body {font-family: Arial; padding:20px; background:#f5f5f5;}
    input {width:100%; padding:10px; margin-bottom:20px;}
    .grid {display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .card {background:#fff; padding:10px; border-radius:10px; text-align:center;}
    img {width:100%; border-radius:10px;}
  </style>
</head>

<body>

<h2> LET'S OUTFIT!🔥</h2>
<p>Ketik kode produk 👇</p>

<input type="text" id="search" placeholder="Cari kode..." onkeyup="searchProduct()">

<div class="grid" id="productList">

  <div class="card" data-code="777">
    <a href="https://s.shopee.co.id/9KeM1AHR0Y" target="_blank">
      <img src="https://ibb.co.com/CsbhBB4p" style="height:150px; object-fit:cover;">
      <p>099 - WAKACAW Texachi Ox Bw </p>
    </a>
  </div>

  <div class="card" data-code="777">
    <a href="https://s.shopee.co.id/3LN8sKeNXY" target="_blank">
      <img src="https://ibb.co.com/v4BxR2Y6" style="height:150px; object-fit:cover;">
      <p>099 - Fromzero </p>
    </a>
  </div>
  


    </a>
  </div>

<script>
function searchProduct() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let code = card.getAttribute("data-code");
    if(code.includes(input)){
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
